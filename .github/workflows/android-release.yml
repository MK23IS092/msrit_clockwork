name: Build & release Android APK

# Builds the Android APK with BACKEND_URL baked in from a repo variable
# (or a manual run input), then either uploads it as an artifact (on every
# push to main) or attaches it to a GitHub Release (on tag push v*).

on:
  push:
    branches: [main]
    tags: ['v*']
    # Intentionally no `paths` filter: combining `paths` with `tags` makes
    # tag pushes silently skip when the tagged commit doesn't touch the
    # filtered paths. Gradle caching keeps the build fast even when the
    # diff is small.
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'BACKEND_URL to bake into the APK (overrides the repo variable)'
        required: false
        default: ''

permissions:
  contents: write   # needed to attach artefacts to a GitHub Release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      # gradlew gets committed from a Windows checkout without the executable
      # bit; reapply it on the Linux runner so `./gradlew` is invokable.
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Resolve BACKEND_URL
        id: resolve
        env:
          INPUT_URL: ${{ inputs.backend_url }}
          REPO_VAR_URL: ${{ vars.BACKEND_URL }}
        run: |
          # Order: workflow input → repo variable → fail loudly.
          url="${INPUT_URL:-$REPO_VAR_URL}"
          if [ -z "$url" ]; then
            echo "::error::No BACKEND_URL set. Define repo variable BACKEND_URL or pass workflow input."
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Building APK against $url"

      - name: Build debug APK
        env:
          BACKEND_URL: ${{ steps.resolve.outputs.url }}
        run: ./gradlew :app:assembleDebug --stacktrace -x lint

      - name: Decode release keystore (optional)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/android/release.keystore"
            echo "have_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_keystore=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK (only if keystore is provided)
        if: steps.keystore.outputs.have_keystore == 'true'
        env:
          BACKEND_URL: ${{ steps.resolve.outputs.url }}
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace -x lint

      - name: List built APKs (for debugging)
        run: find app/build/outputs/apk -type f -name '*.apk' -print

      - name: Rename APKs for release
        run: |
          out=app/build/outputs/apk
          mkdir -p ../dist
          if [ -f "$out/debug/app-debug.apk" ]; then
            cp "$out/debug/app-debug.apk" "../dist/vectormind-${GITHUB_REF_NAME}-debug.apk"
          fi
          if [ -f "$out/release/app-release.apk" ]; then
            cp "$out/release/app-release.apk" "../dist/vectormind-${GITHUB_REF_NAME}-release.apk"
          fi
          ls -la ../dist

      - name: Upload artefacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: vectormind-apks
          path: dist/*.apk
          if-no-files-found: error

      - name: Attach to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
